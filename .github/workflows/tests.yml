name: tests

on:
  pull_request: {}

permissions:
  contents: read

jobs:
  chart-version-bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch --no-tags --prune --depth=1 origin ${{ github.event.pull_request.base.sha }}

      - name: set python up with caching
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: '.tool-versions'
          cache: 'pip'

      - name: Install dependencies
        run: python -m pip install .[ci]

      - name: Verify chart versions bumped
        run: python scripts/check_chart_version_bump.py ${{ github.event.pull_request.base.sha }}

  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # install mise tools with caching
      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true

      - name: set python up with caching
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: '.tool-versions'
          cache: 'pip'

      - name: Install dependencies
        run: python -m pip install -e .[dev]

      - name: Validate release workflow chart list
        run: python scripts/check_release_workflow_charts.py

      - name: Run tests
        run: make test

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # install mise tools with caching
      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true

      - name: Helm lint
        run: pre-commit run helmlint --all-files
