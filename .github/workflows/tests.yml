name: tests

on:
  pull_request: {}

permissions:
  contents: read

jobs:
  chart-version-bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch --no-tags --prune --depth=1 origin ${{ github.event.pull_request.base.sha }}

      - name: set python up with caching
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: '.tool-versions'
          cache: 'pip'

      - name: Install dependencies
        run: python -m pip install .[ci]

      - name: Verify chart versions bumped
        run: python scripts/check_chart_version_bump.py ${{ github.event.pull_request.base.sha }}

  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # install mise tools with caching
      - name: Set up mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          cache: true

      - name: set python up with caching
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: '.tool-versions'
          cache: 'pip'

      - name: Install dependencies
        run: python -m pip install -e .[dev]

      - name: Validate release workflow chart list
        run: python scripts/check_release_workflow_charts.py

      - name: Run tests
        run: make test

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # install mise tools with caching
      - name: Set up mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          cache: true

      - name: Helm lint
        run: pre-commit run helmlint --all-files
