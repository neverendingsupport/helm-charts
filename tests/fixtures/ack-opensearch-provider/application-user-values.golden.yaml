# Source: ack-opensearch-provider/templates/security-bootstrap.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: ack-opensearch-provider-security-bootstrap
  labels:
    helm.sh/chart: ack-opensearch-provider-0.0.0-a.placeholder
    app.kubernetes.io/name: ack-opensearch-provider
    app.kubernetes.io/instance: ack-opensearch-provider
    app.kubernetes.io/managed-by: Helm
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "30"
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        helm.sh/chart: ack-opensearch-provider-0.0.0-a.placeholder
        app.kubernetes.io/name: ack-opensearch-provider
        app.kubernetes.io/instance: ack-opensearch-provider
        app.kubernetes.io/managed-by: Helm
    spec:
      restartPolicy: OnFailure
      serviceAccountName: ack-opensearch-provider-security-bootstrap
      volumes:
        - name: security-bootstrap-workdir
          emptyDir: {}
      initContainers:
        - name: wait-for-connection
          image: "registry.k8s.io/kubectl:v1.34.1@sha256:59bafa07ff3a6d4b417e7633ddb9d79a9606ca98bf64bac080b3e65748669250"
          command:
            - /bin/sh
            - -ec
          volumeMounts:
            - name: security-bootstrap-workdir
              mountPath: /work
          args:
            - |
              domain_name="ack-opensearch-provider"
              secret_name="ack-opensearch-provider-connection"
              username_key="OPENSEARCH_USERNAME"
              password_key="OPENSEARCH_PASSWORD"
              endpoint_scheme="https"
              endpoint_port="443"
              elapsed=0
              poll_interval=10
              max_wait=600

              while [ "$elapsed" -lt "$max_wait" ]; do
                endpoint="$(kubectl get domains.opensearchservice.services.k8s.aws "$domain_name" -o jsonpath='{.status.endpoint}' 2>/dev/null || true)"
                domain_arn="$(kubectl get domains.opensearchservice.services.k8s.aws "$domain_name" -o jsonpath='{.status.ackResourceMetadata.arn}' 2>/dev/null || true)"
                username_template='{{ index .data "'$username_key'" | base64decode }}'
                password_template='{{ index .data "'$password_key'" | base64decode }}'
                username="$(kubectl get secret "$secret_name" -o go-template="$username_template" 2>/dev/null || true)"
                password="$(kubectl get secret "$secret_name" -o go-template="$password_template" 2>/dev/null || true)"
                passwords_ready=true

                if [ -n "$endpoint" ] && [ -n "$username" ] && [ -n "$password" ] && [ -n "$domain_arn" ]; then

                  application_user_password_gorny_app="$(kubectl get secret "gorny-opensearch-app-auth" -o go-template="{{ index .data \"OPENSEARCH_PASSWORD\" | base64decode }}" 2>/dev/null || true)"
                  if [ -z "$application_user_password_gorny_app" ]; then
                    passwords_ready=false
                  else
                    printf '%s' "$application_user_password_gorny_app" >/work/application-user-password-gorny-app
                  fi

                  if [ -n "$application_user_password_gorny_app" ]; then
                    kubectl create secret generic "gorny-opensearch-app-conninfo" \
                      --from-literal=OPENSEARCH_USERNAME="gorny_app" \
                      --from-literal=OPENSEARCH_PASSWORD="${application_user_password_gorny_app}" \
                      --from-literal=OPENSEARCH_HOST="${endpoint}" \
                      --from-literal=OPENSEARCH_PORT="${endpoint_port}" \
                      --from-literal=OPENSEARCH_URL="${endpoint_scheme}://${endpoint}:${endpoint_port}" \
                      --from-literal=OPENSEARCH_AUTH_URL="${endpoint_scheme}://gorny_app:${application_user_password_gorny_app}@${endpoint}:${endpoint_port}" \
                      --from-literal=OPENSEARCH_ARN="${domain_arn}" \
                      --dry-run=client -o yaml | kubectl apply -f - >/dev/null
                    echo '' | base64 -d > /tmp/application-user-connection-gorny-app-metadata.json
                    kubectl patch secret "gorny-opensearch-app-conninfo" --type merge --patch-file /tmp/application-user-connection-gorny-app-metadata.json >/dev/null
                  fi
                  if [ "$passwords_ready" = true ]; then
                    printf '%s' "${endpoint_scheme}://${endpoint}:${endpoint_port}" >/work/opensearch-endpoint
                    printf '%s' "$username" >/work/opensearch-username
                    printf '%s' "$password" >/work/opensearch-password
                    exit 0
                  fi
                fi

                sleep "$poll_interval"
                elapsed=$((elapsed + poll_interval))
              done

              echo "Timed out waiting for domain endpoint, admin credentials, and application user passwords"
              exit 1
      containers:
        - name: bootstrap-security
          image: "curlimages/curl:8.12.1@sha256:94e9e444bcba979c2ea12e27ae39bee4cd10bc7041a472c4727a558e213744e6"
          command:
            - /bin/sh
            - -ec
          volumeMounts:
            - name: security-bootstrap-workdir
              mountPath: /work
          args:
            - |
              OPENSEARCH_ENDPOINT="$(cat /work/opensearch-endpoint)"
              OPENSEARCH_USERNAME="$(cat /work/opensearch-username)"
              OPENSEARCH_ADMIN_PASSWORD="$(cat /work/opensearch-password)"

              json_escape() {
                printf '%s' "$1" | sed \
                  -e 's/\\/\\\\/g' \
                  -e 's/"/\\"/g' \
                  -e 's/\r/\\r/g' \
                  -e ':a;N;$!ba;s/\n/\\n/g' \
                  -e 's/\t/\\t/g'
              }

              put_security_resource() {
                resource_path="$1"
                payload_file="$2"

                status_code="$(
                  curl -sS \
                    -o /tmp/security-api-response.json \
                    -w '%{http_code}' \
                    -u "${OPENSEARCH_USERNAME}:${OPENSEARCH_ADMIN_PASSWORD}" \
                    -H 'Content-Type: application/json' \
                    -X PUT \
                    "${OPENSEARCH_ENDPOINT}/${resource_path}" \
                    --data-binary @"${payload_file}"
                )"

                if [ "$status_code" -lt 200 ] || [ "$status_code" -ge 300 ]; then
                  echo "Failed to apply ${resource_path}: HTTP ${status_code}"
                  cat /tmp/security-api-response.json
                  exit 1
                fi
              }

              apply_role() {
                role_name="$1"
                payload_b64="$2"
                printf '%s' "$payload_b64" | base64 -d >/tmp/security-role.json
                put_security_resource "_plugins/_security/api/roles/${role_name}" /tmp/security-role.json
              }

              apply_role_mapping() {
                role_name="$1"
                payload_b64="$2"
                printf '%s' "$payload_b64" | base64 -d >/tmp/security-role-mapping.json
                put_security_resource "_plugins/_security/api/rolesmapping/${role_name}" /tmp/security-role-mapping.json
              }

              apply_application_user() {
                username="$1"
                password_file="$2"
                roles_b64="$3"
                roles_json="$(printf '%s' "$roles_b64" | base64 -d)"
                password="$(cat "$password_file")"
                escaped_password="$(json_escape "$password")"
                cat > /tmp/security-internal-user.json <<EOF
              {"password":"${escaped_password}","opendistro_security_roles":${roles_json}}
              EOF
                put_security_resource "_plugins/_security/api/internalusers/${username}" /tmp/security-internal-user.json
              }

              apply_role \
                "gorny_app_readwrite" \
                'eyJjbHVzdGVyX3Blcm1pc3Npb25zIjpbImNsdXN0ZXJfY29tcG9zaXRlX29wcyIsImNsdXN0ZXJfbW9uaXRvciJdLCJpbmRleF9wZXJtaXNzaW9ucyI6W3siYWxsb3dlZF9hY3Rpb25zIjpbImNydWQiLCJjcmVhdGVfaW5kZXgiLCJtYW5hZ2UiXSwiaW5kZXhfcGF0dGVybnMiOlsiZ29ybnktKiJdfV19'

              apply_application_user \
                "gorny_app" \
                /work/application-user-password-gorny-app \
                'WyJnb3JueV9hcHBfcmVhZHdyaXRlIl0='
