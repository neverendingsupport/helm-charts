name: sample-domain
engineVersion: OpenSearch_2.11
global:
  imageRepository: 523530333233.dkr.ecr.us-west-2.amazonaws.com/docker-hub
securityBootstrap:
  enabled: true
securityRoles:
  - name: developer_debug_readonly
    clusterPermissions:
      - cluster_composite_ops_ro
      - cluster_monitor
    indexPermissions:
      - indexPatterns:
          - eol-engine-*
        allowedActions:
          - read
          - indices_monitor
          - view_index_metadata
securityRoleMappings:
  - roleName: developer_debug_readonly
    backendRoles:
      - arn:aws:iam::523530333233:role/platform-dev
sequencedConnection:
  enabled: true
