# Source: ack-elasticache-provider/templates/sequenced-bootstrap-jobs.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: ack-elasticache-provider-sync-connection
  labels:
    helm.sh/chart: ack-elasticache-provider-0.0.0-a.placeholder
    app.kubernetes.io/name: ack-elasticache-provider
    app.kubernetes.io/instance: ack-elasticache-provider
    app.kubernetes.io/managed-by: Helm
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "20"
spec:
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        helm.sh/chart: ack-elasticache-provider-0.0.0-a.placeholder
        app.kubernetes.io/name: ack-elasticache-provider
        app.kubernetes.io/instance: ack-elasticache-provider
        app.kubernetes.io/managed-by: Helm
    spec:
      restartPolicy: OnFailure
      serviceAccountName: ack-elasticache-provider-bootstrap
      containers:
        - name: sync-connection
          image: "bitnami/kubectl:latest"
          command:
            - /bin/sh
            - -ec
          args:
            - |
              resource_name="ack-elasticache-provider"
              secret_name="cache-connection"
              username_key="REDIS_USERNAME"
              password_key="REDIS_PASSWORD"
              host_key="REDIS_HOST"
              port_key="REDIS_PORT"
              tls_key="REDIS_TLS"
              url_key="REDIS_URL"
              auth_url_key="REDIS_AUTH_URL"
              arn_key="REDIS_ARN"
              scheme="redis"
              elapsed=0
              poll_interval=15
              max_wait=3600
              tmp_patch=/tmp/secret-patch.json

              while [ "$elapsed" -lt "$max_wait" ]; do
                endpoint="$(kubectl get replicationgroups.elasticache.services.k8s.aws "$resource_name" -o jsonpath='{.status.nodeGroups[0].primaryEndpoint.address}' 2>/dev/null || true)"
                port="$(kubectl get replicationgroups.elasticache.services.k8s.aws "$resource_name" -o jsonpath='{.status.nodeGroups[0].primaryEndpoint.port}' 2>/dev/null || true)"
                arn="$(kubectl get replicationgroups.elasticache.services.k8s.aws "$resource_name" -o jsonpath='{.status.ackResourceMetadata.arn}' 2>/dev/null || true)"

                if [ -n "$endpoint" ] && [ -n "$port" ]; then
                  url="${scheme}://${endpoint}:${port}"
                  auth_url="$url"
                  username="$(kubectl get secret "$secret_name" -o jsonpath="{.data.${username_key}}" 2>/dev/null | base64 --decode || true)"
                  password="$(kubectl get secret "$secret_name" -o jsonpath="{.data.${password_key}}" 2>/dev/null | base64 --decode || true)"
                  if [ "password" = "password" ] && [ -n "$username" ] && [ -n "$password" ]; then
                    auth_url="${scheme}://${username}:${password}@${endpoint}:${port}"
                  fi
                  cat > "$tmp_patch" <<EOF
              {"stringData":{"${host_key}":"${endpoint}","${port_key}":"${port}","${tls_key}":"false","${url_key}":"${url}","${auth_url_key}":"${auth_url}","${arn_key}":"${arn}"}}
              EOF
                  kubectl patch secret "$secret_name" --type merge --patch-file "$tmp_patch"
                  exit 0
                fi

                sleep "$poll_interval"
                elapsed=$((elapsed + poll_interval))
              done

              echo "Timed out waiting for ReplicationGroup primary endpoint"
              exit 1
---
