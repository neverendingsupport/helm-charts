# Source: ack-elasticache-provider/templates/sequenced-bootstrap-jobs.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: ack-elasticache-provider-bootstrap-secret
  labels:
    helm.sh/chart: ack-elasticache-provider-0.0.0-a.placeholder
    app.kubernetes.io/name: ack-elasticache-provider
    app.kubernetes.io/instance: ack-elasticache-provider
    app.kubernetes.io/managed-by: Helm
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "-1"
spec:
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        helm.sh/chart: ack-elasticache-provider-0.0.0-a.placeholder
        app.kubernetes.io/name: ack-elasticache-provider
        app.kubernetes.io/instance: ack-elasticache-provider
        app.kubernetes.io/managed-by: Helm
    spec:
      restartPolicy: OnFailure
      serviceAccountName: ack-elasticache-provider-bootstrap
      containers:
        - name: bootstrap-secret
          image: "bitnami/kubectl:latest"
          command:
            - /bin/sh
            - -ec
          args:
            - |
              secret_name="cache-connection"
              username="default"
              username_key="REDIS_USERNAME"
              password_key="REDIS_PASSWORD"
              host_key="REDIS_HOST"
              port_key="REDIS_PORT"
              tls_key="REDIS_TLS"
              url_key="REDIS_URL"
              auth_url_key="REDIS_AUTH_URL"
              arn_key="REDIS_ARN"
              tmp_secret_manifest=/tmp/secret.yaml
              tmp_secret_patch=/tmp/secret-patch.json

              random_chars() {
                count="$1"
                charset="$2"
                if [ "$count" -le 0 ]; then
                  return 0
                fi
                output=""
                while [ "${#output}" -lt "$count" ]; do
                  output="${output}$(tr -dc "$charset" </dev/urandom | head -c "$((count - ${#output}))")"
                done
                printf '%s' "$output"
              }

              secret_exists=false
              if kubectl get secret "$secret_name" >/dev/null 2>&1; then
                secret_exists=true
              fi

              password=""
              if [ "$secret_exists" = true ]; then
                existing_password="$(kubectl get secret "$secret_name" -o jsonpath="{.data.${password_key}}" 2>/dev/null | base64 --decode || true)"
                if [ -n "$existing_password" ]; then
                  echo '' | base64 -d > /tmp/secret-metadata-patch.json
                  kubectl patch secret "$secret_name" --type merge --patch-file /tmp/secret-metadata-patch.json
                  password="$existing_password"
                fi
              fi

              if [ -z "$password" ]; then
                digits_part="$(random_chars 8 '0-9')"
                symbols_part="$(random_chars 4 '!&#$^<>-')"
                base_charset='a-z0-9!&#$^<>-'
                base_charset='A-Za-z0-9!&#$^<>-'
                remaining_part="$(random_chars 20 "$base_charset")"
                password="${digits_part}${symbols_part}${remaining_part}"
              fi

              cat > "$tmp_secret_manifest" <<EOF
              apiVersion: v1
              kind: Secret
              metadata:
                name: cache-connection
                labels:
                  helm.sh/chart: ack-elasticache-provider-0.0.0-a.placeholder
                  app.kubernetes.io/name: ack-elasticache-provider
                  app.kubernetes.io/instance: ack-elasticache-provider
                  app.kubernetes.io/managed-by: Helm
              type: Opaque
              stringData:
                REDIS_USERNAME: "default"
                REDIS_HOST: ""
                REDIS_PORT: "6379"
                REDIS_TLS: "false"
                REDIS_URL: ""
                REDIS_AUTH_URL: ""
                REDIS_ARN: ""
                REDIS_PASSWORD: "${password}"
              EOF

              if [ "$secret_exists" = true ]; then
                cat > "$tmp_secret_patch" <<EOF
              {"stringData":{"${username_key}":"${username}","${host_key}":"","${port_key}":"6379","${tls_key}":"false","${url_key}":"","${auth_url_key}":"","${arn_key}":"","${password_key}":"${password}"}}
              EOF
                kubectl patch secret "$secret_name" --type merge --patch-file "$tmp_secret_patch"
                echo '' | base64 -d > /tmp/secret-metadata-patch.json
                kubectl patch secret "$secret_name" --type merge --patch-file /tmp/secret-metadata-patch.json
              else
                kubectl create -f "$tmp_secret_manifest"
              fi
