image:
  repository: ghcr.io/example/app
  tag: "1.2.3"
initContainers:
  - image: busybox:1.36.1
    command:
      - sh
      - -c
      - echo ready
awsEnvSecrets:
  secrets:
    - env_secret_name: aws-env
      externalSecret:
        secretPath: test/stage/secret
    - env_secret_name: common-env
      externalSecret:
        secretPath: common/stage/secret
        secretStoreRef:
          kind: ClusterSecretStore
          name: aws-secrets-manager
