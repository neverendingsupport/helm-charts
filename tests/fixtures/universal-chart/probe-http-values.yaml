image:
  repository: ghcr.io/example/app
  tag: "1.2.3"
startupProbe:
  httpGet:
    path: /diagnostics/health
    port: http
  periodSeconds: 5
  failureThreshold: 60
livenessProbe:
  httpGet:
    path: /internal/health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
readinessProbe:
  httpGet:
    path: /internal/ready
    port: http
  initialDelaySeconds: 0
  periodSeconds: 10
  failureThreshold: 3
