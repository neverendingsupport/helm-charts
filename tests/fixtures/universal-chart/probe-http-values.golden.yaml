---
# Source: universal-chart/templates/serviceaccount.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: universal-chart
  labels:
    helm.sh/chart: universal-chart-0.0.0-a.placeholder
    app.kubernetes.io/name: universal-chart
    app.kubernetes.io/instance: universal-chart
    app.kubernetes.io/managed-by: Helm
automountServiceAccountToken: true
---
# Source: universal-chart/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: universal-chart
  labels:
    helm.sh/chart: universal-chart-0.0.0-a.placeholder
    app.kubernetes.io/name: universal-chart
    app.kubernetes.io/instance: universal-chart
    app.kubernetes.io/managed-by: Helm
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: universal-chart
    app.kubernetes.io/instance: universal-chart
---
# Source: universal-chart/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: universal-chart
  labels:
    helm.sh/chart: universal-chart-0.0.0-a.placeholder
    app.kubernetes.io/name: universal-chart
    app.kubernetes.io/instance: universal-chart
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: universal-chart
      app.kubernetes.io/instance: universal-chart
  template:
    metadata:
      labels:
        helm.sh/chart: universal-chart-0.0.0-a.placeholder
        app.kubernetes.io/name: universal-chart
        app.kubernetes.io/instance: universal-chart
        app.kubernetes.io/managed-by: Helm
    spec:
      serviceAccountName: universal-chart
      containers:
        - name: universal-chart
          env: &containerenv
            # placeholder var so we can always make an env list
            - name: REDIS_ENABLED
              value: "false"
          image: "ghcr.io/example/app:1.2.3"
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          startupProbe:
            failureThreshold: 60
            httpGet:
              path: /diagnostics/health
              port: http
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /internal/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /internal/ready
              port: http
            initialDelaySeconds: 0
            periodSeconds: 10
      topologySpreadConstraints:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/instance: universal-chart
              app.kubernetes.io/name: universal-chart
          maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
