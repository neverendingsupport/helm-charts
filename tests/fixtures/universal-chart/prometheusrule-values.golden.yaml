---
# Source: universal-chart/templates/serviceaccount.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: universal-chart
  labels:
    helm.sh/chart: universal-chart-0.0.0-a.placeholder
    app.kubernetes.io/name: universal-chart
    app.kubernetes.io/instance: universal-chart
    app.kubernetes.io/managed-by: Helm
automountServiceAccountToken: true
---
# Source: universal-chart/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: universal-chart
  labels:
    helm.sh/chart: universal-chart-0.0.0-a.placeholder
    app.kubernetes.io/name: universal-chart
    app.kubernetes.io/instance: universal-chart
    app.kubernetes.io/managed-by: Helm
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: universal-chart
    app.kubernetes.io/instance: universal-chart
---
# Source: universal-chart/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: universal-chart
  labels:
    helm.sh/chart: universal-chart-0.0.0-a.placeholder
    app.kubernetes.io/name: universal-chart
    app.kubernetes.io/instance: universal-chart
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: universal-chart
      app.kubernetes.io/instance: universal-chart
  template:
    metadata:
      labels:
        helm.sh/chart: universal-chart-0.0.0-a.placeholder
        app.kubernetes.io/name: universal-chart
        app.kubernetes.io/instance: universal-chart
        app.kubernetes.io/managed-by: Helm
    spec:
      serviceAccountName: universal-chart
      containers:
        - name: universal-chart
          env: &containerenv
            # placeholder var so we can always make an env list
            - name: REDIS_ENABLED
              value: "false"
          image: "ghcr.io/example/app:1.2.3"
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
      topologySpreadConstraints:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/instance: universal-chart
              app.kubernetes.io/name: universal-chart
          maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
---
# Source: universal-chart/templates/prometheusrule.yaml
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: universal-chart
  labels:
    helm.sh/chart: universal-chart-0.0.0-a.placeholder
    app.kubernetes.io/name: universal-chart
    app.kubernetes.io/instance: universal-chart
    app.kubernetes.io/managed-by: Helm
    team: example
  annotations:
    example.com/source: chart
spec:
  groups:
    - name: universal-chart
      rules:
        - alert: ApplicationDown
          annotations:
            description: App {{ $labels.job }} has no healthy targets
            summary: App {{ $labels.job }} down
          expr: up{job="universal-chart"} == 0
          for: 2m
          labels:
            severity: warning
            slack_channel: '#alert-example'
            team: example
