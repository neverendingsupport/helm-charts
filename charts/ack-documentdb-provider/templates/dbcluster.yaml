{{- $legacy := .Values.dbCluster | default dict }}
{{- $annotations := mergeOverwrite (deepCopy (default dict $legacy.annotations)) (default dict .Values.annotations) }}
{{- $topLevelSpec := dict }}
{{- range $key, $value := (omit .Values "nameOverride" "fullnameOverride" "resourceName" "annotations" "connectionSecret" "auth" "reflector" "fieldExport" "pushSecret" "dbCluster") }}
{{- if and (ne $value nil) (not (and (kindIs "map" $value) (eq (len $value) 0))) (not (and (kindIs "slice" $value) (eq (len $value) 0))) }}
{{- $_ := set $topLevelSpec $key $value }}
{{- end }}
{{- end }}
{{- $spec := mergeOverwrite (deepCopy (default dict $legacy.spec)) $topLevelSpec }}
apiVersion: documentdb.services.k8s.aws/v1alpha1
kind: DBCluster
metadata:
  name: {{ coalesce .Values.resourceName $legacy.name (include "ack-documentdb-provider.fullname" .) }}
  labels:
    {{- include "ack-documentdb-provider.labels" . | nindent 4 }}
  {{- with $annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- toYaml $spec | nindent 2 }}
