# @schema
# type: object
# properties:
#   create:
#     type: boolean
#   name:
#     type: string
#   annotations:
#     type: object
#     additionalProperties: true
#   keys:
#     type: object
#     properties:
#       username:
#         type: string
#       host:
#         type: string
#       port:
#         type: string
#       url:
#         type: string
#       authURL:
#         type: string
#       arn:
#         type: string
# @schema
# -- Settings for the generated in-cluster connection secret.
connectionSecret:
  # -- Create the connection secret shell object.
  create: true
  # -- Name for the generated connection secret.
  # Defaults to `<release>-<chart>-connection`.
  name: ""
  # -- Additional annotations to place on the connection secret.
  annotations: {}
  # -- Output key names written into the generated connection secret.
  keys:
    username: OPENSEARCH_USERNAME
    host: OPENSEARCH_HOST
    port: OPENSEARCH_PORT
    url: OPENSEARCH_URL
    authURL: OPENSEARCH_AUTH_URL
    arn: OPENSEARCH_ARN

# @schema
# type: object
# properties:
#   mode:
#     enum:
#       - password
#       - irsa
#   username:
#     type: string
#   irsaRoleArn:
#     type: string
#   password:
#     type: object
#     properties:
#       key:
#         type: string
#       length:
#         type: integer
#         minimum: 1
#       digits:
#         type: integer
#         minimum: 0
#       symbols:
#         type: integer
#         minimum: 0
#       noUpper:
#         type: boolean
#       allowRepeat:
#         type: boolean
# @schema
# -- Authentication data written into the generated connection secret.
auth:
  # -- Use generated password auth or IRSA (empty password) auth.
  mode: password
  # -- Username written to the connection secret.
  username: admin
  # -- Optional IAM role ARN written in IRSA mode.
  irsaRoleArn: ""
  password:
    # -- Key used for the generated password in the connection secret.
    key: OPENSEARCH_PASSWORD
    # -- Generated password length.
    length: 32
    # -- Include digits in generated password.
    digits: 8
    # -- Include symbols in generated password.
    symbols: 4
    # -- Disallow upper-case chars.
    noUpper: false
    # -- Allow repeated characters.
    allowRepeat: true

# @schema
# type: object
# properties:
#   enabled:
#     type: boolean
#   image:
#     type: string
#   kubectlImage:
#     type: string
#   activeDeadlineSeconds:
#     type: integer
#     minimum: 1
#   backoffLimit:
#     type: integer
#     minimum: 0
#   ttlSecondsAfterFinished:
#     type: integer
#     minimum: 0
# @schema
# -- Bootstrap OpenSearch security roles and role mappings using the admin credential.
securityBootstrap:
  # -- Enable the security bootstrap job.
  enabled: false
  # -- Image used for the security API calls.
  image: curlimages/curl:8.21.0@sha256:7c12af72ceb38b7432ab85e1a265cff6ae58e06f95539d539b654f2cfa64bb13 # renovate: datasource=docker depName=curlimages/curl versioning=docker
  # -- kubectl image used to wait for the domain endpoint and admin secret data.
  kubectlImage: registry.k8s.io/kubectl:v1.34.1@sha256:59bafa07ff3a6d4b417e7633ddb9d79a9606ca98bf64bac080b3e65748669250 # renovate: datasource=docker depName=registry.k8s.io/kubectl versioning=docker
  # -- Maximum runtime for the bootstrap job.
  activeDeadlineSeconds: 600
  # -- Retry count for the bootstrap job.
  backoffLimit: 3
  # -- TTL for the completed bootstrap job.
  ttlSecondsAfterFinished: 3600

