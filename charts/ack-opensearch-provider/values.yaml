applicationUsers: []

# @schema
# type: object
# properties:
#   enabled:
#     type: boolean
#   syncWave:
#     type: integer
#   pollIntervalSeconds:
#     type: integer
#     minimum: 1
#   maxWaitSeconds:
#     type: integer
#     minimum: 1
#   ttlSecondsAfterFinished:
#     type: integer
#     minimum: 0
#   kubectlImage:
#     type: string
# @schema
# -- Use Argo hook jobs to create a stable connection secret before sync and patch endpoint data after the Domain becomes ready.
sequencedConnection:
  # -- Enable Argo-hooked secret bootstrapping and connection-data syncing.
  enabled: false
  # -- Sync wave used by the post-resource connection sync job.
  syncWave: 20
  # -- Poll interval for waiting on the Domain endpoint.
  pollIntervalSeconds: 15
  # -- Maximum time to wait for the Domain endpoint to appear.
  maxWaitSeconds: 3600
  # -- TTL for completed sequencing jobs.
  ttlSecondsAfterFinished: 3600
  # -- kubectl image used by the sequencing jobs.
  kubectlImage: registry.k8s.io/kubectl:v1.34.1@sha256:59bafa07ff3a6d4b417e7633ddb9d79a9606ca98bf64bac080b3e65748669250 # renovate: datasource=docker depName=registry.k8s.io/kubectl versioning=docker

# @schema
# type: object
# properties:
#   enabled:
#     type: boolean
#   pushNamespaces:
#     type: array
#     items:
#       type: string
#   allowedNamespaces:
#     type: array
#     items:
#       type: string
# @schema
# -- Secret reflector settings for syncing the connection secret across namespaces.
reflector:
  enabled: false
  # -- Namespaces to push reflected secrets into.
  pushNamespaces: []
  # -- Namespaces allowed to pull/reflect this secret.
  allowedNamespaces: []

# @schema
# type: object
# properties:
#   enabled:
#     type: boolean
#   mappings:
#     type: array
#     items:
#       type: object
#       required:
#         - name
#         - path
#         - key
#       properties:
#         name:
#           type: string
#         path:
#           type: string
#         key:
#           type: string
# @schema
# -- FieldExport settings for copying Domain status fields into the connection secret.
fieldExport:
  enabled: true
  # -- Fields exported from Domain status into the generated secret.
  mappings:
    - name: host
      path: ".status.endpoint"
      key: OPENSEARCH_HOST
    - name: arn
      path: ".status.arn"
      key: OPENSEARCH_ARN

# @schema
# type: object
# properties:
#   enabled:
#     type: boolean
#   name:
#     type: string
#   storeKind:
#     enum:
#       - SecretStore
#       - ClusterSecretStore
#   refreshInterval:
#     type: string
#   sourceKey:
#     type: string
#   target:
#     type: object
#     properties:
#       name:
#         type: string
#       provider:
#         type: string
#       type:
#         type: string
# @schema
# -- External Secrets PushSecret settings for publishing a selected secret key to an external store.
pushSecret:
  enabled: false
  name: ""
  storeKind: SecretStore
  refreshInterval: 1h
  sourceKey: OPENSEARCH_HOST
  target:
    # -- Remote secret name in the target provider.
    name: ""
    # -- External Secrets store ref name (e.g. aws-secrets-manager).
    provider: ""
    # -- Remote provider-specific secret type/property.
    type: Opaque
