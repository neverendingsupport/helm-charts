{{- $users := default (list) .Values.applicationUsers -}}
{{- if gt (len $users) 0 }}
{{- if not .Values.securityBootstrap.enabled }}
{{- fail "applicationUsers requires securityBootstrap.enabled=true so the bootstrap job can reconcile internal users" }}
{{- end }}
{{- range $idx, $user := $users }}
{{- $password := $user.password | default dict -}}
{{- if $password.generate | default false }}
{{- $passwordLength := int (default $.Values.auth.password.length $password.length) -}}
{{- $passwordDigits := int (default $.Values.auth.password.digits $password.digits) -}}
{{- $passwordSymbols := int (default $.Values.auth.password.symbols $password.symbols) -}}
{{- if lt $passwordLength (add $passwordDigits $passwordSymbols) }}
{{- fail (printf "applicationUsers[%d].password.length must be >= password.digits + password.symbols" $idx) }}
{{- end }}
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: {{ include "ack-opensearch-provider.applicationUserPasswordGeneratorName" (dict "root" $ "user" $user) }}
  labels:
    {{- include "ack-opensearch-provider.labels" $ | nindent 4 }}
spec:
  length: {{ $passwordLength }}
  digits: {{ $passwordDigits }}
  symbols: {{ $passwordSymbols }}
  noUpper: {{ $password.noUpper | default $.Values.auth.password.noUpper }}
  allowRepeat: {{ $password.allowRepeat | default $.Values.auth.password.allowRepeat }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "ack-opensearch-provider.applicationUserPasswordExternalSecretName" (dict "root" $ "user" $user) }}
  labels:
    {{- include "ack-opensearch-provider.labels" $ | nindent 4 }}
spec:
  refreshInterval: 1h
  target:
    name: {{ include "ack-opensearch-provider.applicationUserPasswordSecretName" (dict "root" $ "user" $user) }}
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        {{ default "OPENSEARCH_PASSWORD" $password.secretKey }}: "{{ `{{ .password }}` }}"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: {{ include "ack-opensearch-provider.applicationUserPasswordGeneratorName" (dict "root" $ "user" $user) }}
{{- else }}
{{- $existing := $password.existingSecretRef | default dict -}}
{{- if not $existing.name }}
{{- fail (printf "applicationUsers[%d].password.existingSecretRef.name must be set when password.generate=false" $idx) }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
