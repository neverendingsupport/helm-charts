{{- if .Values.sequencedConnection.enabled }}
{{- $auth := .Values.auth | default dict }}
{{- $legacy := .Values.domain | default dict }}
{{- $domainName := coalesce .Values.resourceName $legacy.name (include "ack-opensearch-provider.fullname" .) }}
{{- $secretName := include "ack-opensearch-provider.connectionSecretName" . }}
{{- $secretAnnotations := include "ack-opensearch-provider.connectionSecretAnnotations" . | trim }}
{{- $passwordLength := int .Values.auth.password.length }}
{{- $passwordDigits := int .Values.auth.password.digits }}
{{- $passwordSymbols := int .Values.auth.password.symbols }}
{{- if not .Values.connectionSecret.create }}
{{- fail "connectionSecret.create must be true when sequencedConnection.enabled=true" }}
{{- end }}
{{- if and (eq $auth.mode "password") (not .Values.auth.password.allowRepeat) }}
{{- fail "auth.password.allowRepeat=false is not supported when sequencedConnection.enabled=true" }}
{{- end }}
{{- if and (eq $auth.mode "password") (lt $passwordLength (add $passwordDigits $passwordSymbols)) }}
{{- fail "auth.password.length must be greater than or equal to auth.password.digits + auth.password.symbols when sequencedConnection.enabled=true" }}
{{- end }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ack-opensearch-provider.bootstrapServiceAccountName" . }}
  labels:
    {{- include "ack-opensearch-provider.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-2"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "ack-opensearch-provider.bootstrapRoleName" . }}
  labels:
    {{- include "ack-opensearch-provider.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-2"
rules:
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - create
      - update
      - patch
  - apiGroups:
      - opensearchservice.services.k8s.aws
    resources:
      - domains
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "ack-opensearch-provider.bootstrapRoleBindingName" . }}
  labels:
    {{- include "ack-opensearch-provider.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-2"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "ack-opensearch-provider.bootstrapRoleName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "ack-opensearch-provider.bootstrapServiceAccountName" . }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "ack-opensearch-provider.secretBootstrapJobName" . }}
  labels:
    {{- include "ack-opensearch-provider.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "-1"
spec:
  ttlSecondsAfterFinished: {{ .Values.sequencedConnection.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "ack-opensearch-provider.labels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "ack-opensearch-provider.bootstrapServiceAccountName" . }}
      containers:
        - name: bootstrap-secret
          image: {{ .Values.sequencedConnection.kubectlImage | quote }}
          command:
            - /bin/sh
            - -ec
          args:
            - |
              secret_name={{ $secretName | quote }}
              username={{ .Values.auth.username | quote }}
              username_key={{ .Values.connectionSecret.keys.username | quote }}
              password_key={{ .Values.auth.password.key | quote }}
              host_key={{ .Values.connectionSecret.keys.host | quote }}
              port_key={{ .Values.connectionSecret.keys.port | quote }}
              url_key={{ .Values.connectionSecret.keys.url | quote }}
              auth_url_key={{ .Values.connectionSecret.keys.authURL | quote }}
              arn_key={{ .Values.connectionSecret.keys.arn | quote }}
              tmp_secret_manifest=/tmp/secret.yaml
              tmp_secret_patch=/tmp/secret-patch.json

              random_chars() {
                count="$1"
                charset="$2"
                if [ "$count" -le 0 ]; then
                  return 0
                fi
                output=""
                while [ "${#output}" -lt "$count" ]; do
                  output="${output}$(tr -dc "$charset" </dev/urandom | head -c "$((count - ${#output}))")"
                done
                printf '%s' "$output"
              }

              secret_exists=false
              if kubectl get secret "$secret_name" >/dev/null 2>&1; then
                secret_exists=true
              fi

              password=""
              {{- if eq $auth.mode "password" }}
              if [ "$secret_exists" = true ]; then
                existing_password="$(kubectl get secret "$secret_name" -o jsonpath="{.data.${password_key}}" 2>/dev/null | base64 --decode || true)"
                if [ -n "$existing_password" ]; then
                  exit 0
                fi
              fi

              digits_part="$(random_chars {{ $passwordDigits }} '0-9')"
              symbols_part="$(random_chars {{ $passwordSymbols }} '!@#%^*_+=')"
              base_charset='a-z0-9!@#%^*_+='
              {{- if not .Values.auth.password.noUpper }}
              base_charset='A-Za-z0-9!@#%^*_+='
              {{- end }}
              remaining_part="$(random_chars {{ sub $passwordLength (add $passwordDigits $passwordSymbols) }} "$base_charset")"
              password="${digits_part}${symbols_part}${remaining_part}"
              {{- else }}
              if [ "$secret_exists" = true ]; then
                exit 0
              fi
              {{- end }}

              cat > "$tmp_secret_manifest" <<EOF
              apiVersion: v1
              kind: Secret
              metadata:
                name: {{ $secretName }}
                labels:
{{ include "ack-opensearch-provider.labels" . | trim | indent 18 }}
              {{- if $secretAnnotations }}
                annotations:
{{ $secretAnnotations | indent 18 }}
              {{- end }}
              type: Opaque
              stringData:
                {{ .Values.connectionSecret.keys.username }}: {{ .Values.auth.username | quote }}
                {{ .Values.connectionSecret.keys.host }}: ""
                {{ .Values.connectionSecret.keys.port }}: {{ ternary 443 80 (.Values.domainEndpointOptions.enforceHTTPS | default true) | quote }}
                {{ .Values.connectionSecret.keys.url }}: ""
                {{ .Values.connectionSecret.keys.authURL }}: ""
                {{ .Values.connectionSecret.keys.arn }}: ""
              {{- if eq $auth.mode "password" }}
                {{ .Values.auth.password.key }}: "${password}"
              {{- else }}
                {{ .Values.auth.password.key }}: ""
              {{- if .Values.auth.irsaRoleArn }}
                AWS_ROLE_ARN: {{ .Values.auth.irsaRoleArn | quote }}
              {{- end }}
              {{- end }}
              EOF

              if [ "$secret_exists" = true ]; then
                cat > "$tmp_secret_patch" <<EOF
              {"stringData":{"${username_key}":"${username}","${host_key}":"","${port_key}":"{{ ternary 443 80 (.Values.domainEndpointOptions.enforceHTTPS | default true) }}","${url_key}":"","${auth_url_key}":"","${arn_key}":""{{ if eq $auth.mode "password" }},"${password_key}":"${password}"{{ else }},"${password_key}":""{{ if .Values.auth.irsaRoleArn }},"AWS_ROLE_ARN":{{ .Values.auth.irsaRoleArn | quote }}{{ end }}{{ end }}}}
              EOF
                kubectl patch secret "$secret_name" --type merge --patch-file "$tmp_secret_patch"
              else
                kubectl create -f "$tmp_secret_manifest"
              fi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "ack-opensearch-provider.endpointSyncJobName" . }}
  labels:
    {{- include "ack-opensearch-provider.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: {{ .Values.sequencedConnection.syncWave | quote }}
spec:
  ttlSecondsAfterFinished: {{ .Values.sequencedConnection.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "ack-opensearch-provider.labels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "ack-opensearch-provider.bootstrapServiceAccountName" . }}
      containers:
        - name: sync-connection
          image: {{ .Values.sequencedConnection.kubectlImage | quote }}
          command:
            - /bin/sh
            - -ec
          args:
            - |
              domain_name={{ $domainName | quote }}
              secret_name={{ $secretName | quote }}
              username_key={{ .Values.connectionSecret.keys.username | quote }}
              password_key={{ .Values.auth.password.key | quote }}
              host_key={{ .Values.connectionSecret.keys.host | quote }}
              port_key={{ .Values.connectionSecret.keys.port | quote }}
              url_key={{ .Values.connectionSecret.keys.url | quote }}
              auth_url_key={{ .Values.connectionSecret.keys.authURL | quote }}
              arn_key={{ .Values.connectionSecret.keys.arn | quote }}
              scheme={{ ternary "https" "http" (.Values.domainEndpointOptions.enforceHTTPS | default true) | quote }}
              port={{ ternary 443 80 (.Values.domainEndpointOptions.enforceHTTPS | default true) | quote }}
              elapsed=0
              poll_interval={{ .Values.sequencedConnection.pollIntervalSeconds }}
              max_wait={{ .Values.sequencedConnection.maxWaitSeconds }}
              tmp_patch=/tmp/secret-patch.json

              while [ "$elapsed" -lt "$max_wait" ]; do
                endpoint="$(kubectl get domains.opensearchservice.services.k8s.aws "$domain_name" -o jsonpath='{.status.endpoint}' 2>/dev/null || true)"
                arn="$(kubectl get domains.opensearchservice.services.k8s.aws "$domain_name" -o jsonpath='{.status.ackResourceMetadata.arn}' 2>/dev/null || true)"

                if [ -n "$endpoint" ]; then
                  url="${scheme}://${endpoint}:${port}"
                  auth_url="$url"
                  username="$(kubectl get secret "$secret_name" -o jsonpath="{.data.${username_key}}" 2>/dev/null | base64 --decode || true)"
                  password="$(kubectl get secret "$secret_name" -o jsonpath="{.data.${password_key}}" 2>/dev/null | base64 --decode || true)"
                  if [ "{{ $auth.mode }}" = "password" ] && [ -n "$username" ] && [ -n "$password" ]; then
                    auth_url="${scheme}://${username}:${password}@${endpoint}:${port}"
                  fi
                  cat > "$tmp_patch" <<EOF
              {"stringData":{"${host_key}":"${endpoint}","${port_key}":"${port}","${url_key}":"${url}","${auth_url_key}":"${auth_url}","${arn_key}":"${arn}"}}
              EOF
                  kubectl patch secret "$secret_name" --type merge --patch-file "$tmp_patch"
                  exit 0
                fi

                sleep "$poll_interval"
                elapsed=$((elapsed + poll_interval))
              done

              echo "Timed out waiting for Domain endpoint"
              exit 1
{{- end }}
